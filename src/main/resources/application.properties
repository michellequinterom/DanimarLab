# Puerto (usa el del host en la nube, 8080 en local)
server.port=${PORT:8080}

# Base de datos H2 en memoria (se recarga del catálogo al iniciar)
spring.datasource.url=jdbc:h2:mem:danimar;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate: crea las tablas a partir de las entidades
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# Carga el catálogo (data.sql) después de crear las tablas
spring.sql.init.mode=always

# Consola de H2 (opcional): /h2-console
spring.h2.console.enabled=true
