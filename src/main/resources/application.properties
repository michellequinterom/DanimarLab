# Puerto (usa el del host en la nube, 8080 en local)
server.port=${PORT:8080}

# Base de datos H2 en ARCHIVO FÍSICO (Persistente)
spring.datasource.url=jdbc:h2:file:./database/bddanimar;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate: ACTUALIZA las tablas sin borrarlas al reiniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# Carga el catálogo pero continúa si hay registros duplicados
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# Consola de H2 (opcional): /h2-console
spring.h2.console.enabled=true
